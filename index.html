<!DOCTYPE html>
<html lang="ru">
    
<head>
    <meta charset="UTF-8">
    <title>Панель мониторинга</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <h1>Price Service</h1>
        <div id="auth-form">
            <input type="text" id="username" placeholder="Логин">
            <input type="password" id="password" placeholder="Пароль">
            <button id="auth-btn">Войти</button>
        </div>
        
        <div id="task-form" class="hidden">
            <input type="text" id="url" placeholder="Ссылка на товар">
            <select id="type">
                <option value="price">Мониторинг цены</option>
                <option value="stock">Мониторинг наличия</option>
            </select>
            <button id="add-task-btn">Запустить мониторинг</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
